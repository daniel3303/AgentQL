name: Bug report
description: Something in AgentQL behaves incorrectly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please fill in everything below — a minimal repro is by far the most useful part.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Smallest DbContext / configuration / call sequence that triggers it. Link a gist or repo if large.
      render: csharp
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full exception / generated SQL / schema output if relevant.
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: AgentQL package version
      placeholder: e.g. Equibles.AgentQL.MicrosoftAI 0.1.3
    validations:
      required: true
  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      placeholder: e.g. .NET 10.0.100
    validations:
      required: true
  - type: input
    id: database
    attributes:
      label: Database provider
      placeholder: e.g. SQLite, PostgreSQL 16, SQL Server 2022
    validations:
      required: true
