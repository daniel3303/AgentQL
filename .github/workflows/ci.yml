name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore

      - name: CSharpier (format check)
        run: dotnet csharpier check .

      - name: Build (warnings as errors)
        run: dotnet build -c Release --no-restore -warnaserror

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Codecov tokenless auth via GitHub OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      # Unit + integration tiers only. The Playwright/functional tier is a
      # separate cadence (own workflow) per the testing standards: it needs
      # browser binaries and a Kestrel host, and its project does not carry
      # the code-coverage extension — passing it the --coverage args makes
      # the MTP host reject them and fail the whole run with exit code 5.
      - name: Test (unit + integration, with coverage)
        run: |
          dotnet test --project tests/Equibles.AgentQL.UnitTests/Equibles.AgentQL.UnitTests.csproj \
            -c Release --no-build \
            -- --coverage --coverage-output-format cobertura \
            --coverage-output coverage.cobertura.xml
          dotnet test --project tests/Equibles.AgentQL.IntegrationTests/Equibles.AgentQL.IntegrationTests.csproj \
            -c Release --no-build \
            -- --coverage --coverage-output-format cobertura \
            --coverage-output coverage.cobertura.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          # No CODECOV_TOKEN secret: authenticate tokenlessly via GitHub OIDC.
          # Plain tokenless uploads are rejected on protected branches
          # ("Token required because branch is protected"), which is why main
          # never got coverage. OIDC fixes that — it needs the job-level
          # `id-token: write` permission added below and use_oidc: true.
          use_oidc: true
          files: tests/**/TestResults/coverage.cobertura.xml
          disable_search: true
          fail_ci_if_error: true
