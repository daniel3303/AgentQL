name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore

      - name: CSharpier (format check)
        run: dotnet csharpier check .

      - name: Build (warnings as errors)
        run: dotnet build -c Release --no-restore -warnaserror

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Codecov tokenless auth via GitHub OIDC
    env:
      # The shared Docker Hub IP pool on hosted runners gets rate-limited and
      # times out mid-pull, which previously failed the whole integration tier
      # while Testcontainers fetched its Ryuk reaper sidecar. Runners are
      # ephemeral, so the reaper's only job (cleaning up leaked containers) is
      # redundant here — disabling it removes that image pull entirely.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      # Pre-pull the only image the integration tier needs, with retries, so a
      # transient Docker Hub timeout or rate-limit retries here instead of
      # aborting the whole test run. Once it is in the local cache,
      # Testcontainers reuses it without touching the registry.
      - name: Pull integration test image
        run: |
          for attempt in 1 2 3 4 5; do
            if docker pull postgres:16-alpine; then
              exit 0
            fi
            echo "docker pull failed (attempt $attempt), retrying in 15s..."
            sleep 15
          done
          echo "::error::Could not pull postgres:16-alpine after 5 attempts."
          exit 1

      # Unit + integration tiers only. The Playwright/functional tier is a
      # separate cadence (own workflow) per the testing standards: it needs
      # browser binaries and a Kestrel host, and its project does not carry
      # the code-coverage extension — passing it the --coverage args makes
      # the MTP host reject them and fail the whole run with exit code 5.
      - name: Test (unit + integration, with coverage)
        run: |
          dotnet test --project tests/Equibles.AgentQL.UnitTests/Equibles.AgentQL.UnitTests.csproj \
            -c Release --no-build \
            -- --coverage --coverage-output-format cobertura \
            --coverage-output coverage.cobertura.xml
          dotnet test --project tests/Equibles.AgentQL.IntegrationTests/Equibles.AgentQL.IntegrationTests.csproj \
            -c Release --no-build \
            -- --coverage --coverage-output-format cobertura \
            --coverage-output coverage.cobertura.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          # No CODECOV_TOKEN secret: authenticate tokenlessly via GitHub OIDC.
          # Plain tokenless uploads are rejected on protected branches
          # ("Token required because branch is protected"), which is why main
          # never got coverage. OIDC fixes that — it needs the job-level
          # `id-token: write` permission added below and use_oidc: true.
          use_oidc: true
          files: tests/**/TestResults/coverage.cobertura.xml
          disable_search: true
          # Coverage upload is best-effort: Codecov-side outages (e.g. its
          # uploader GPG-signature check failing with "No public key" when the
          # keyserver is unreachable) must not fail an otherwise-green build.
          fail_ci_if_error: false
