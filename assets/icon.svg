  <path d="M28 42 v24 c0 4.4 9.8 8 22 8 s22-3.6 22-8 V42" fill="none" stroke="#fff" stroke-width="3"/>
  <ellipse cx="50" cy="42" rx="22" ry="8" fill="#fff" opacity="0.15"/>

